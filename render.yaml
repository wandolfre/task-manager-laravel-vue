services:
  - type: web
    name: task-manager
    runtime: php
    repo: https://github.com/wandolfre/task-manager-laravel-vue
    buildCommand: |
      composer install --no-dev --optimize-autoloader &&
      npm install &&
      npm run build &&
      php artisan config:cache &&
      php artisan route:cache &&
      php artisan view:cache &&
      php artisan migrate --force
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/data/database.sqlite
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
